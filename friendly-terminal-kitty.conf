# ABOUTME: Friendly Terminal color scheme for Kitty.
# ABOUTME: Warm parchment palette inspired by claude.ai.

# Install: save to ~/.config/kitty/themes/friendly-terminal.conf
# Activate: add  include themes/friendly-terminal.conf  to kitty.conf
# Or use:  kitty +kitten themes --custom-path=path/to/this/dir

background #F5F0E8
foreground #2D2B26

cursor #DA7756
cursor_text_color #F5F0E8

selection_background #DDD1C0
selection_foreground #2D2B26

# Normal
color0  #2D2B26
color1  #B5432E
color2  #3E7A4F
color3  #86650F
color4  #3A6090
color5  #7A4D72
color6  #2D7070
color7  #7A756B

# Bright
color8  #6B6455
color9  #DA7756
color10 #5A9A6A
color11 #B8922D
color12 #5A83B5
color13 #9B6B8A
color14 #4D8C8C
color15 #DDD6CA
